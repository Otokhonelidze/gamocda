<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Document</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f4f4f4;
        }

        .download-btn {
            background: #0078d4;
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .download-btn:hover {
            background: #005fa3;
        }
    </style>
</head>
<body>

<a href="documents/MyDocument.docx" download>
    <button class="download-btn">
        Download Document
    </button>
</a>

</body>
</html>
